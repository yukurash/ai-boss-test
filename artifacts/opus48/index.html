<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Game Arcade</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #10131a;
    --panel: #1a1f2b;
    --accent: #5fd0ff;
    --text: #e8ecf4;
    --text-dim: #8a93a6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid #2a3040;
  }

  .app-title {
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  button {
    font: inherit;
    color: var(--text);
    background: #232a3a;
    border: 1px solid #3a4257;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
  }

  button:hover { border-color: var(--accent); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
  }

  .screen { display: none; }
  #screen-menu { display: block; }

  .menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 320px;
  }

  .menu-buttons button {
    padding: 14px 20px;
    font-size: 1.05rem;
    text-align: left;
  }

  .coming-soon {
    color: var(--text-dim);
    font-style: italic;
  }
</style>
</head>
<body>

<header class="app-header">
  <h1 class="app-title">Mini Game Arcade</h1>
  <button type="button" class="btn-menu" onclick="Arcade.showScreen('menu')">Menu</button>
</header>

<main>
  <section class="screen" id="screen-menu">
    <h2>Menu</h2>
    <div class="menu-buttons">
      <button type="button" onclick="Arcade.showScreen('breakout')">Breakout</button>
      <button type="button" onclick="Arcade.showScreen('reflex')">Reflex</button>
      <button type="button" onclick="Arcade.showScreen('records')">Records</button>
    </div>
  </section>

  <section class="screen" id="screen-breakout"></section>

  <section class="screen" id="screen-reflex"></section>

  <section class="screen" id="screen-records"></section>
</main>

<script src="core.js"></script>
<script src="games/breakout.js"></script>
<script src="games/reflex.js"></script>
<script src="games/records.js"></script>
<script>
  Arcade.showScreen('menu');
</script>
</body>
</html>
